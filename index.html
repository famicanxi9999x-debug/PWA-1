<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowState Life OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            animation: {
              "shine-pulse": "shine-pulse var(--shine-pulse-duration) infinite linear",
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards",
              "background-gradient": "background-gradient var(--background-gradient-speed, 15s) cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite",
            },
            keyframes: {
              "shine-pulse": {
                "0%": { "background-position": "0% 0%" },
                "50%": { "background-position": "100% 100%" },
                "to": { "background-position": "0% 0%" },
              },
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              slideUp: {
                "0%": { transform: "translateY(20px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
              "background-gradient": {
                "0%, 100%": {
                  transform: "translate(0, 0)",
                  animationDelay: "var(--background-gradient-delay, 0s)",
                },
                "20%": {
                  transform:
                    "translate(calc(100% * var(--tx-1, 1)), calc(100% * var(--ty-1, 1)))",
                },
                "40%": {
                  transform:
                    "translate(calc(100% * var(--tx-2, -1)), calc(100% * var(--ty-2, 1)))",
                },
                "60%": {
                  transform:
                    "translate(calc(100% * var(--tx-3, 1)), calc(100% * var(--ty-3, -1)))",
                },
                "80%": {
                  transform:
                    "translate(calc(100% * var(--tx-4, -1)), calc(100% * var(--ty-4, -1)))",
                },
              },
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
      }

      /* Base Style Overrides for Premium Feel */
      body { 
          font-family: 'Inter', sans-serif; 
          background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
          background-attachment: fixed;
          color: white;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(255, 255, 255, 0.2);
      }
      
      /* Utilities */
      .pb-safe {
          padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "clsx": "https://esm.sh/clsx@^2.1.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^2.2.1",
    "class-variance-authority": "https://esm.sh/class-variance-authority@^0.7.0",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@^1.0.2",
    "framer-motion": "https://esm.sh/framer-motion@^11.0.8"
  }
}
</script>
</head>
  <body class="transition-colors duration-500">
    <div id="root"></div>
  </body>
</html>
